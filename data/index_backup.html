<!DOCTYPE html>
<html>
<head>
    <title>Medição de Torque</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            color: #333;
            margin: 0;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        h1 { color: #0066cc; margin-bottom: 5px; }
        p { margin-top: 0; margin-bottom: 20px; }
        .header-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            width: 100%;
            max-width: 1200px;
        }
        .logo-container { width: 100px; display: flex; justify-content: center; }
        .logo-container img { height: 100px; }
        .header-text { flex-grow: 1; text-align: center; }
        .dashboard-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
        }
        .chart-section, .info-box, .data-table-section {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin: 10px;
        }
        .chart-section { flex-grow: 1; min-width: 300px; }
        .info-section { min-width: 250px; }
        .info-box .value { font-size: 2.5em; font-weight: bold; }
        .battery-container {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        .battery-fill { height:100%; width:0%; }
        @media (max-width:768px){
            .dashboard-container { flex-direction: column; }
        }

        /* ================== FUNCIONALIDADE DE TABELA (extraída do HTML 2) ================== */
        .data-table-section {
            width: 100%;
            max-width: 1200px;
            margin-top: 20px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }
        .data-table-section h2 {
            color: #0066cc;
            text-align: center;
        }
        .data-table-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .data-table-controls button {
            padding: 10px 20px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
        }
        .data-table-controls button:hover {
            background-color: #0056b3;
        }
        #dataTable {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        #dataTable th, #dataTable td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        #dataTable th {
            background-color: #f2f2f2;
            color: #333;
            text-transform: uppercase;
            font-size: 0.9em;
        }
        .delete-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            font-size: 0.8em;
            cursor: pointer;
            text-align: center;
        }
        .delete-btn:hover {
            background-color: #c82333;
        }
        /* ==================================================================================== */
    </style>
</head>
<body>
<div class="header-section">
    <div class="logo-container"><img src="/pme_logo.png"></div>
    <div class="header-text">
        <h1>Laboratório de Máquinas de Fluxo</h1>
        <p>Painel de medição de torque em tempo real.</p>
    </div>
    <div class="logo-container"><img src="/poli_logo.png"></div>
</div>
<div class="battery-container">
    <div class="battery-icon"><div id="batteryFill"></div></div>
    <span id="batteryPercentage">--%</span>
    <small id="batteryVoltageDisplay">-- V</small>
</div>
<div class="dashboard-container">
    <div class="chart-section">
        <canvas id="torqueChart"></canvas>
    </div>
    <div class="info-section">
        <div class="info-box">
            <h2>Torque Instantâneo</h2>
            <div class="value" id="currentTorqueValue">0.00</div>
        </div>
        <div class="info-box">
            <h2>Torque Médio</h2>
            <div class="value" id="averageTorqueValue">0.00</div>
        </div>
        <div class="info-box">
            <h2>Torque Máximo</h2>
            <div class="value" id="maxTorqueValue">0.00</div>
            <button onclick="resetMaxTorque()">Resetar</button>
        </div>
        <!-- 🔥 CALIBRAÇÃO -->
        <div class="info-box">
            <h2>Calibração</h2>
            <div>Fator atual: <b id="currentCalibration">--</b></div>
            <input type="number" id="calibrationInput" placeholder="Ex: 10000" style="width:100%; margin-top:10px;">
            <input type="password" id="calibrationPassword" placeholder="Senha" style="width:100%; margin-top:10px;">
            <button onclick="setCalibration()" style="margin-top:10px;">Aplicar</button>
        </div>
    </div>
</div>

<!-- ================== TABELA DE REGISTRO (funcionalidade completa extraída do HTML 2) ================== -->
<div class="data-table-section">
    <h2>Registro de Medições</h2>
    <div class="data-table-controls">
        <button onclick="registerCurrent()">Registrar Torque Instantâneo</button>
        <button onclick="registerAverage()">Registrar Torque Médio</button>
    </div>
    <table id="dataTable">
        <thead>
            <tr>
                <th>Medição</th>
                <th>Tipo de medição</th>
                <th>Valor do torque (N.m)</th>
                <th>Horário de medição (HH:MM:SS)</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
</div>
<!-- ====================================================================================================== -->

<script>
const ctx = document.getElementById('torqueChart').getContext('2d');
let torqueData = [];
let labels = [];
let maxTorque = 0;
const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: 'Torque',
            data: torqueData,
            borderColor: 'blue'
        }]
    }
});
function fetchTorqueData() {
    fetch('/torque')
        .then(r => r.text())
        .then(v => {
            const torque = parseFloat(v);
            if (isNaN(torque)) return;
            const time = new Date().toLocaleTimeString();
            labels.push(time);
            torqueData.push(torque);
            if (labels.length > 20) {
                labels.shift();
                torqueData.shift();
            }
            chart.update();
            document.getElementById('currentTorqueValue').textContent = torque.toFixed(2);
            const avg = torqueData.reduce((a,b)=>a+b,0)/torqueData.length;
            document.getElementById('averageTorqueValue').textContent = avg.toFixed(2);
            if (Math.abs(torque) > maxTorque) {
                maxTorque = Math.abs(torque);
                document.getElementById('maxTorqueValue').textContent = maxTorque.toFixed(2);
            }
        });
}
function resetMaxTorque(){
    maxTorque = 0;
    document.getElementById('maxTorqueValue').textContent = "0.00";
}
/************* CALIBRAÇÃO *************/
function setCalibration() {
    const value = document.getElementById("calibrationInput").value;
    const pass = document.getElementById("calibrationPassword").value;
    if (!value || !pass) {
        alert("Preencha valor e senha!");
        return;
    }
    fetch(`/set_calibration?value=${value}&pass=${pass}`)
        .then(r => r.text())
        .then(resp => {
            alert(resp);
            getCalibration();
        });
}
function getCalibration() {
    fetch("/get_calibration")
        .then(r => r.text())
        .then(v => {
            document.getElementById("currentCalibration").textContent = parseFloat(v).toFixed(2);
        });
}

/* ================== FUNCIONALIDADE DE SALVAR/EXCLUIR NA TABELA (extraída integralmente do HTML 2) ================== */
const dataTableBody = document.querySelector('#dataTable tbody');

function renumberTable() {
    const rows = dataTableBody.getElementsByTagName('tr');
    for (let i = 0; i < rows.length; i++) {
        rows[i].cells[0].textContent = i + 1;
    }
}

function formatTime(date) {
    const hours = String(date.getHours()).padStart(2, '0');
    const minutes = String(date.getMinutes()).padStart(2, '0');
    const seconds = String(date.getSeconds()).padStart(2, '0');
    return `${hours}:${minutes}:${seconds}`;
}

function registerValue(value, type) {
    const now = new Date();
    const timeString = formatTime(now);
  
    const newRow = dataTableBody.insertRow();
    const cell1 = newRow.insertCell(0);
    const cell2 = newRow.insertCell(1);
    const cell3 = newRow.insertCell(2);
    const cell4 = newRow.insertCell(3);
    const cell5 = newRow.insertCell(4);
    cell1.textContent = dataTableBody.rows.length;
    cell2.textContent = type;
    cell3.textContent = `${value.toFixed(2)} N.m`;
    cell4.textContent = timeString;
  
    const deleteBtn = document.createElement('button');
    deleteBtn.textContent = 'x';
    deleteBtn.className = 'delete-btn';
    deleteBtn.onclick = () => {
        dataTableBody.removeChild(newRow);
        renumberTable();
    };
    cell5.appendChild(deleteBtn);
}

function registerCurrent() {
    const currentValue = parseFloat(document.getElementById('currentTorqueValue').textContent);
    if (!isNaN(currentValue)) {
        registerValue(currentValue, 'Instantâneo');
    }
}

function registerAverage() {
    const averageValue = parseFloat(document.getElementById('averageTorqueValue').textContent);
    if (!isNaN(averageValue)) {
        registerValue(averageValue, 'Médio');
    }
}
/* ================================================================================================================== */

getCalibration();
setInterval(fetchTorqueData, 1000);
</script>
</body>
</html>
