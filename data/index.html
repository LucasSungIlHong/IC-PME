<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Medição de Torque</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f0f0f0;
    margin:0;
    padding:20px;
    text-align:center;
}

.header-section{
	vertical-align:middle;
    justify-content:space-between;
    align-items:center;
    max-width:1200px;
    margin:auto;
    gap:20px;
}

.logos-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    margin-bottom:10px;
}

.title-row h1{
    margin-bottom:5px;
}

.title-row p{
    margin-top:0;
}

.dashboard-container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    max-width:1200px;
    margin:auto;
}

.chart-section,.info-box,.data-table-section{
    background:white;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.chart-section{
    flex:1;
    min-width:400px;
    padding:20px;
    margin:10px;
}

.info-section{
    width:280px;
    margin:10px;
}

.info-box{
    padding:20px;
    margin-bottom:20px;
}

.value{
    font-size:2.5em;
    font-weight:bold;
}

.battery-container{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:10px;
    margin-bottom:20px;
}

.battery-row{
    display:flex;
    align-items:center;
    gap:8px;
}

.battery-icon{
    width:52px;
    height:24px;
    border:3px solid #333;
    border-radius:4px;
    position:relative;
}

.battery-icon::after{
    content:"";
    position:absolute;
    right:-8px;
    top:6px;
    width:6px;
    height:12px;
    background:#333;
}

.battery-fill{
    height:100%;
    width:0%;
    background:#38c172;
}

.data-table-section{
    max-width:1200px;
    margin:20px auto;
    padding:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    background:#007BFF;
    color:white;
    cursor:pointer;
}

.delete-btn{
    background:#dc3545;
    border-radius:50%;
    width:25px;
    height:25px;
}

input{
    width:100%;
    padding:8px;
    margin-top:10px;
    box-sizing:border-box;
}
</style>
</head>

<body>

<div class="header-section">
	 <div class="logos-row">
		<img src="poli_logo.png" style="height:100px;">
		<img src="pme_logo.png" style="height:100px;">
	</div>
	<div class="title-row">
        <h1>Laboratório de Máquinas de Fluxo</h1>
	</div>
</div>

<div class="battery-container">
    <div class="battery-row">
        <div class="battery-icon">
            <div class="battery-fill" id="batteryFill"></div>
        </div>
        <span id="batteryPercentage">--%</span>
    </div>
    <small id="batteryVoltageDisplay">-- V</small>
</div>

<div class="dashboard-container">

    <div class="chart-section">
        <canvas id="torqueChart"></canvas>
    </div>

    <div class="info-section">

        <div class="info-box">
            <h2>Torque Instantâneo</h2>
            <div class="value" id="currentTorqueValue">0.00</div>
        </div>

        <div class="info-box">
            <h2>Torque Médio</h2>
            <div class="value" id="averageTorqueValue">0.00</div>
        </div>

        <div class="info-box">
            <h2>Torque Máximo</h2>
            <div class="value" id="maxTorqueValue">0.00</div>
            <button onclick="resetMaxTorque()">Resetar Máximo</button>
        </div>

        <div class="info-box">
            <h2>Calibração</h2>

            <div>Fator atual: <b id="currentCalibration">10000</b></div>

            <input type="number" id="calibrationInput" placeholder="Ex: 10000">
            <input type="password" id="calibrationPassword" placeholder="Senha">

            <button onclick="setCalibration()">Aplicar</button>
        </div>

    </div>

</div>

<div class="data-table-section">

    <h2>Registro de Medições</h2>

    <button onclick="registerCurrent()">Registrar Torque Instantâneo</button>
    <button onclick="registerAverage()">Registrar Torque Médio</button>

    <table id="dataTable">

        <thead>
            <tr>
                <th>Medição</th>
                <th>Tipo</th>
                <th>Torque</th>
                <th>Horário</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody></tbody>

    </table>

</div>

<script>

// ======================================================
// CONFIGURAÇÃO
// ======================================================

const SIMULATION_MODE = true;

// ======================================================
// VARIÁVEIS
// ======================================================

let torqueValue = 0;
let adcValue = 0;

let maxTorque = 0;

const startTime = Date.now();

let simul_calibration_factor = 10000;

const SIMUL_PASSWORD = "1234";

const K = 2.12 * 0.8845;

let buffer_adc = [];

const currentTorqueDisplay =
    document.getElementById('currentTorqueValue');

const averageTorqueDisplay =
    document.getElementById('averageTorqueValue');

const maxTorqueDisplay =
    document.getElementById('maxTorqueValue');

const batteryFill =
    document.getElementById('batteryFill');

const batteryPercentageDisplay =
    document.getElementById('batteryPercentage');

const batteryVoltageDisplay =
    document.getElementById('batteryVoltageDisplay');

const dataTableBody =
    document.querySelector('#dataTable tbody');

// ======================================================
// GRÁFICO
// ======================================================

const ctx =
    document.getElementById('torqueChart').getContext('2d');

const torqueChart = new Chart(ctx, {

    type:'line',

    data:{
        labels:[],
        datasets:[{
            label:'Torque (N.m)',
            data:[],
            borderColor:'rgba(75,192,192,1)',
            backgroundColor:'rgba(75,192,192,0.2)',
            pointRadius:0,
            pointHoverRadius:0,
            tension:0
        }]
    },

    options:{

        responsive:true,

        animation:false,

        scales:{

            x:{
                title:{
                    display:true,
                    text:'Tempo (segundos)',

                    font:{
                        size:16,
                        weight:'bold'
                    },

                    color:'#333'
                },
				ticks:{
					maxTicksLimit:6
				}
            },

            y:{
				min:0,
				max:50,
                title:{
                    display:true,
                    text:'Torque (N.m)',

                    font:{
                        size:16,
                        weight:'bold'
                    },

                    color:'#333'
                }
            }
        }
    }
});

// ======================================================
// AUXILIARES
// ======================================================

function formatTime(date){

    return date.toLocaleTimeString();
}

function avg(arr){

    if(arr.length===0) return 0;

    return arr.reduce((a,b)=>a+b,0)/arr.length;
}

function calculateAverage(dataArray,numPoints){

    const slice =
        dataArray.slice(-numPoints);

    return avg(slice);
}

// ======================================================
// SIMULAÇÃO
// ======================================================

function generateSimulatedTorque(){

    const elapsed =
        (Date.now()-startTime)/1000;

    const baseTorque =
        15 +
        10*Math.sin(0.5*elapsed) +
        0.2*Math.sin(2*elapsed);

    return baseTorque *
        (10000/simul_calibration_factor);
}

function generateSimulatedADC(){

    const elapsed =
        (Date.now()-startTime)/1000;

    return 2.0 + 0.24*Math.sin(0.05*elapsed);
}

// ======================================================
// WEBSOCKET
// ======================================================

function get_WS_data(jsonString){

    const data = JSON.parse(jsonString);

    torqueValue = parseFloat(data.torque);
    adcValue = parseFloat(data.adc);
}

// ======================================================
// BATERIA
// ======================================================

function updateBattery(vAdc){

    buffer_adc.push(vAdc);

    if(buffer_adc.length>20)
        buffer_adc.shift();

    const vBat = avg(buffer_adc)*K;

    batteryVoltageDisplay.textContent =
        vBat.toFixed(2)+" V";

    let pct =
        100*(vBat-3.3)/(4.2-3.3);

    pct = Math.max(0,Math.min(100,pct));

    batteryPercentageDisplay.textContent =
        Math.round(pct)+"%";

    batteryFill.style.width = pct+"%";

    if(pct>60)
        batteryFill.style.background="#38c172";
    else if(pct>30)
        batteryFill.style.background="#ffcc00";
    else
        batteryFill.style.background="#e3342f";
}

// ======================================================
// PRINCIPAL
// ======================================================

function fetchTorqueData(){

    if(SIMULATION_MODE){

        torqueValue =
            generateSimulatedTorque();

        adcValue =
            generateSimulatedADC();
    }

    const now = new Date();
	
	const elapsedMinutes = ((((Date.now()-startTime)/1000 - 1.0)).toFixed(0) );

//   if(torqueChart.data.labels.length>20){
//
//        torqueChart.data.labels.shift();
//        torqueChart.data.datasets[0].data.shift();
//    }

    torqueChart.data.labels.push(
        elapsedMinutes
    );

    torqueChart.data.datasets[0].data.push(
        torqueValue
    );

    torqueChart.update();

    currentTorqueDisplay.textContent =
        torqueValue.toFixed(2);

    const averageValue =
        calculateAverage(
            torqueChart.data.datasets[0].data,
            5
        );

    averageTorqueDisplay.textContent =
        averageValue.toFixed(2);

    if(Math.abs(torqueValue)>maxTorque){

        maxTorque =
            Math.abs(torqueValue);

        maxTorqueDisplay.textContent =
            maxTorque.toFixed(2);
    }

    updateBattery(adcValue);
}

// ======================================================
// TABELA
// ======================================================

function renumberTable(){

    const rows =
        dataTableBody.getElementsByTagName('tr');

    for(let i=0;i<rows.length;i++){

        rows[i].cells[0].textContent =
            i+1;
    }
}

function registerValue(value,type){

    const row =
        dataTableBody.insertRow();

    row.insertCell(0).textContent =
        dataTableBody.rows.length;

    row.insertCell(1).textContent =
        type;

    row.insertCell(2).textContent =
        value.toFixed(2)+" N.m";

    row.insertCell(3).textContent =
        formatTime(new Date());

    const cell5 = row.insertCell(4);

    const btn =
        document.createElement('button');

    btn.textContent = 'x';

    btn.className = 'delete-btn';

    btn.onclick = ()=>{

        dataTableBody.removeChild(row);

        renumberTable();
    };

    cell5.appendChild(btn);
}

function registerCurrent(){

    registerValue(
        torqueValue,
        'Instantâneo'
    );
}

function registerAverage(){

    registerValue(
        parseFloat(
            averageTorqueDisplay.textContent
        ),
        'Médio'
    );
}

// ======================================================
// CALIBRAÇÃO
// ======================================================

function setCalibration(){

    const value =
        document.getElementById(
            'calibrationInput'
        ).value;

    const pass =
        document.getElementById(
            'calibrationPassword'
        ).value;

    if(pass!==SIMUL_PASSWORD){

        alert('Senha incorreta');

        return;
    }

    simul_calibration_factor =
        parseFloat(value);

    document.getElementById(
        'currentCalibration'
    ).textContent =
        simul_calibration_factor.toFixed(2);

    alert('OK');
}

function resetMaxTorque(){

    maxTorque = 0;

    maxTorqueDisplay.textContent =
        '0.00';
}

// ======================================================
// INICIALIZAÇÃO
// ======================================================

if(SIMULATION_MODE){

    setInterval(fetchTorqueData,1000);
}
else{

    const gateway =
        `ws://${window.location.hostname}/ws`;

    const websocket =
        new WebSocket(gateway);

    websocket.onmessage = function(event){

        get_WS_data(event.data);

        fetchTorqueData();
    };
}

</script>

  "adc": 2.08

-->

</body>
</html>
