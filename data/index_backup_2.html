<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Medição de Torque</title>

<script src="chart.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f0f0f0;
    margin:0;
    padding:20px;
    text-align:center;
}

.header-section{
	vertical-align:middle;
    justify-content:space-between;
    align-items:center;
    max-width:1200px;
    margin:auto;
    gap:20px;
}

.logos-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    margin-bottom:10px;
}

.title-row h1{
    margin-bottom:5px;
}

.title-row p{
    margin-top:0;
}

.dashboard-container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    max-width:1200px;
    margin:auto;
}

.chart-section,.info-box,.data-table-section{
    background:white;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.chart-section{
    flex:1;
    min-width:400px;
    padding:20px;
    margin:10px;
}

.info-section{
    width:280px;
    margin:10px;
}

.info-box{
    padding:20px;
    margin-bottom:20px;
}

.value{
    font-size:2.5em;
    font-weight:bold;
}

.battery-container{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:10px;
    margin-bottom:20px;
}

.battery-row{
    display:flex;
    align-items:center;
    gap:8px;
}

.battery-icon{
    width:52px;
    height:24px;
    border:3px solid #333;
    border-radius:4px;
    position:relative;
}

.battery-icon::after{
    content:"";
    position:absolute;
    right:-8px;
    top:6px;
    width:6px;
    height:12px;
    background:#333;
}

.battery-fill{
    height:100%;
    width:0%;
    background:#38c172;
}

.data-table-section{
    max-width:1200px;
    margin:20px auto;
    padding:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    background:#007BFF;
    color:white;
    cursor:pointer;
}

.delete-btn{
    background:#dc3545;
    border-radius:50%;
    width:25px;
    height:25px;
}

input{
    width:100%;
    padding:8px;
    margin-top:10px;
    box-sizing:border-box;
}
</style>
</head>

<body>

<div class="header-section">
	 <div class="logos-row">
		<img src="poli_logo.png" style="height:100px;">
		<img src="pme_logo.png" style="height:100px;">
	</div>
	<div class="title-row">
        <h1>Laboratório de Máquinas de Fluxo</h1>
	</div>
</div>

<div class="battery-container">
    <div class="battery-row">
        <div class="battery-icon">
            <div class="battery-fill" id="batteryFill"></div>
        </div>
        <span id="batteryPercentage">--%</span>
    </div>
    <small id="batteryVoltageDisplay">-- V</small>
</div>

<div class="dashboard-container">

    <div class="chart-section">
        <canvas id="torqueChart"></canvas>
    </div>

    <div class="info-section">

        <div class="info-box">
            <h2>Torque Instantâneo</h2>
            <div class="value" id="currentTorqueValue">0.00</div>
        </div>

        <div class="info-box">
            <h2>Torque Médio</h2>
            <div class="value" id="averageTorqueValue">0.00</div>
        </div>

        <div class="info-box">
            <h2>Torque Máximo</h2>
            <div class="value" id="maxTorqueValue">0.00</div>
            <button onclick="resetMaxTorque()">Resetar Máximo</button>
        </div>

        <div class="info-box">
            <h2>Calibração</h2>

            <div>Fator atual: <b id="currentCalibration">10000</b></div>

            <input type="number" id="calibrationInput" placeholder="Ex: 10000">
            <input type="password" id="calibrationPassword" placeholder="Senha">

            <button onclick="setCalibration()">Aplicar</button>
        </div>

    </div>

</div>

<div class="data-table-section">

    <h2>Registro de Medições</h2>

    <button onclick="registerCurrent()">Registrar Torque Instantâneo</button>
    <button onclick="registerAverage()">Registrar Torque Médio</button>

    <table id="dataTable">

        <thead>
            <tr>
                <th>Medição</th>
                <th>Tipo</th>
                <th>Torque</th>
                <th>Horário</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody></tbody>

    </table>

</div>

<script>

// ======================================================
// CONFIGURAÇÃO
// ======================================================

const SIMULATION_MODE = false;

// ======================================================
// VARIÁVEIS
// ======================================================

let torqueValue = 0;
let adcValue = 0;

let maxTorque = 0;

const startTime = Date.now();

let simul_calibration_factor = 10000;

const SIMUL_PASSWORD = "1234";

const K = 2.12 * 0.8845;

let buffer_adc = [];

const currentTorqueDisplay =
    document.getElementById('currentTorqueValue');

const averageTorqueDisplay =
    document.getElementById('averageTorqueValue');

const maxTorqueDisplay =
    document.getElementById('maxTorqueValue');

const batteryFill =
    document.getElementById('batteryFill');

const batteryPercentageDisplay =
    document.getElementById('batteryPercentage');

const batteryVoltageDisplay =
    document.getElementById('batteryVoltageDisplay');

const dataTableBody =
    document.querySelector('#dataTable tbody');

// ======================================================
// GRÁFICO
// ======================================================

const ctx =
    document.getElementById('torqueChart').getContext('2d');

const torqueChart = new Chart(ctx, {

    type:'line',

    data:{
        labels:[],
        datasets:[{
            label:'Torque (N.m)',
            data:[],
            borderColor:'rgba(75,192,192,1)',
            backgroundColor:'rgba(75,192,192,0.2)',
            pointRadius:0,
            pointHoverRadius:0,
            tension:0
        }]
    },

    options:{

        responsive:true,

        animation:false,

        scales:{

            x:{
                title:{
                    display:true,
                    text:'Tempo (segundos)',

                    font:{
                        size:16,
                        weight:'bold'
                    },

                    color:'#333'
                },
				ticks:{
					maxTicksLimit:6
				}
            },

            y:{
				min:0,
				max:50,
                title:{
                    display:true,
                    text:'Torque (N.m)',

                    font:{
                        size:16,
                        weight:'bold'
                    },

                    color:'#333'
                }
            }
        }
    }
});

// ======================================================
// AUXILIARES
// ======================================================

function formatTime(date){

    return date.toLocaleTimeString();
}

function avg(arr){

    if(arr.length===0) return 0;

    return arr.reduce((a,b)=>a+b,0)/arr.length;
}

function calculateAverage(dataArray,numPoints){

    const slice =
        dataArray.slice(-numPoints);

    return avg(slice);
}

// ======================================================
// SIMULAÇÃO
// ======================================================

function generateSimulatedTorque(){

    const elapsed =
        (Date.now()-startTime)/1000;

    const baseTorque =
        15 +
        10*Math.sin(0.5*elapsed) +
        0.2*Math.sin(2*elapsed);

    return baseTorque *
        (10000/simul_calibration_factor);
}

function generateSimulatedADC(){

    const elapsed =
        (Date.now()-startTime)/1000;

    return 2.0 + 0.24*Math.sin(0.05*elapsed);
}

// ======================================================
// PROCESSAMENTO DOS DADOS (NEXO COM O GRÁFICO)
// ======================================================

function processNewData() {
    // Atualiza valor máximo de torque
    if (torqueValue > maxTorque) {
        maxTorque = torqueValue;
        maxTorqueDisplay.innerText = maxTorque.toFixed(3);
    }

    // Atualiza displays de texto instantâneo
    currentTorqueDisplay.innerText = torqueValue.toFixed(3);

    // Adiciona dados ao gráfico
    const timestamp = ((Date.now() - startTime) / 1000).toFixed(1);
    torqueChart.data.labels.push(timestamp);
    torqueChart.data.datasets[0].data.push(torqueValue);

    // Mantém no máximo 60 pontos visíveis no gráfico para não travar a página
    if (torqueChart.data.labels.length > 60) {
        torqueChart.data.labels.shift();
        torqueChart.data.datasets[0].data.shift();
    }
    torqueChart.update();

    // Calcula torque médio usando o histórico do próprio gráfico
    const mediaMovel = calculateAverage(torqueChart.data.datasets[0].data, 30);
    averageTorqueDisplay.innerText = mediaMovel.toFixed(3);

    // Filtro e cálculo de bateria baseado no divisor resistivo do pino ADC
    buffer_adc.push(adcValue);
    if (buffer_adc.length > 20) buffer_adc.shift();
    const adcAveraged = avg(buffer_adc);

    // Mapeamento de tensão real (considerando o fator K informado)
    const realVoltage = adcAveraged * K;
    batteryVoltageDisplay.innerText = realVoltage.toFixed(2) + " V";

    // Mapeia de 3.3V (0%) a 4.2V (100%) da célula de LiPo/Lítio
    let pct = ((realVoltage - 3.3) / (4.2 - 3.3)) * 100;
    if (pct > 100) pct = 100;
    if (pct < 0) pct = 0;

    batteryFill.style.width = pct.toFixed(0) + "%";
    batteryPercentageDisplay.innerText = pct.toFixed(0) + "%";

    // Altera cor da bateria caso esteja fraca
    if (pct < 20) {
        batteryFill.style.backgroundColor = "#dc3545";
    } else {
        batteryFill.style.backgroundColor = "#38c172";
    }
}

// ======================================================
// CONEXÃO WEBSOCKET REAL (O QUE FALTAVA)
// ======================================================

let websocket;
// Conecta dinamicamente na porta 81 do ESP32 que gerou a página
const gateway = `ws://${window.location.hostname}:81/`;

function initWebSocket() {
    if (SIMULATION_MODE) {
        console.log("Modo de simulação ativo.");
        setInterval(() => {
            torqueValue = generateSimulatedTorque();
            adcValue = generateSimulatedADC();
            processNewData();
        }, 500);
        return;
    }

    console.log("Tentando conectar ao WebSocket do ESP32...");
    websocket = new WebSocket(gateway);

    websocket.onopen = function() {
        console.log("Conectado ao ESP32 via WebSocket.");
    };

    websocket.onclose = function() {
        console.log("Conexão fechada. Tentando reconectar em 2 segundos...");
        setTimeout(initWebSocket, 2000);
    };

    websocket.onerror = function(error) {
        console.error("Erro no WebSocket: ", error);
    };

    websocket.onmessage = function(event) {
        try {
            const data = JSON.parse(event.data);
            torqueValue = parseFloat(data.torque);
            adcValue = parseFloat(data.adc);
            
            // Dispara a atualização visual da tela
            processNewData();
        } catch (e) {
            console.error("Erro ao processar JSON recebido:", e);
        }
    };
}

// Busca o fator de calibração direto do servidor HTTP do ESP32 no início
function fetchCurrentCalibration() {
    if (SIMULATION_MODE) return;
    fetch('/get_calibration')
        .then(response => response.text())
        .then(data => {
            document.getElementById('currentCalibration').innerText = parseFloat(data).toFixed(1);
        })
        .catch(err => console.error("Erro ao buscar fator:", err));
}

// ======================================================
// INTERAÇÕES DA INTERFACE (BOTÕES)
// ======================================================

function resetMaxTorque() {
    maxTorque = 0;
    maxTorqueDisplay.innerText = "0.000";
}

function setCalibration() {
    const valInput = document.getElementById('calibrationInput').value;
    const passInput = document.getElementById('calibrationPassword').value;

    if (!valInput || !passInput) {
        alert("Preencha o valor e a senha.");
        return;
    }

    if (SIMULATION_MODE) {
        if (passInput === SIMUL_PASSWORD) {
            simul_calibration_factor = parseFloat(valInput);
            document.getElementById('currentCalibration').innerText = simul_calibration_factor;
            alert("Calibração alterada (Modo Simulação).");
        } else {
            alert("Senha incorreta.");
        }
        return;
    }

    // Envia comando HTTP GET via AJAX configurado no ESP32
    fetch(`/set_calibration?value=${valInput}&pass=${passInput}`)
        .then(response => {
            if (response.status === 200) {
                alert("Fator de calibração atualizado com sucesso!");
                document.getElementById('currentCalibration').innerText = parseFloat(valInput).toFixed(1);
            } else if (response.status === 403) {
                alert("Senha inválida!");
            } else {
                alert("Erro ao enviar comando.");
            }
        })
        .catch(err => alert("Erro na requisição: " + err));
}

let rowCount = 0;
function addTableRow(type, value) {
    rowCount++;
    const row = document.createElement('tr');
    row.innerHTML = `
        <td>${rowCount}</td>
        <td>${type}</td>
        <td>${value.toFixed(3)} N.m</td>
        <td>${formatTime(new Date())}</td>
        <td><button class="delete-btn" onclick="this.closest('tr').remove()">X</button></td>
    `;
    dataTableBody.appendChild(row);
}

function registerCurrent() {
    addTableRow("Instantâneo", torqueValue);
}

function registerAverage() {
    const currentAvg = parseFloat(averageTorqueDisplay.innerText);
    addTableRow("Médio", currentAvg);
}

// Inicialização Geral da Página
window.addEventListener('load', () => {
    initWebSocket();
    fetchCurrentCalibration();
});

</script>
</body>
</html>
